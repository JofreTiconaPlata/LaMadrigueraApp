name: CI Flutter + Backend

on:
  push:
    branches:
      - main
      - develop
      - feature/**
      - fix/**
      - chore/**
      - ci/**
  pull_request:
    branches:
      - main
      - develop

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check Dart format
        run: dart format --set-exit-if-changed .

  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Flutter project
        run: flutter analyze

  test:
    name: Flutter Tests
    runs-on: ubuntu-latest
    needs:
      - format
      - analyze

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run Flutter tests
        run: flutter test

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://ci_user:ci_password@localhost:5432/ci_db
      DIRECT_URL: postgresql://ci_user:ci_password@localhost:5432/ci_db
      JWT_SECRET: ci_jwt_secret_for_backend_validation_123456

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build backend
        run: npm run build

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs:
      - test
      - backend-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug
